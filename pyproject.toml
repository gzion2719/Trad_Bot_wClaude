[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# E402: intentional pattern — module docstrings appear before imports in every file
ignore = ["E402"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
markers = ["market: requires live market fills — run manually only: pytest -m market"]
