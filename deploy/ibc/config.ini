# IBC Configuration File
# Fill in IbLoginId and IbPassword before starting ibgateway.service.
# All other values are correct for paper trading — do not change them.

FIX=no

# ── CREDENTIALS (fill these in) ──────────────────────────────────────────────
IbLoginId=YOUR_IBKR_USERNAME
IbPassword=YOUR_IBKR_PASSWORD

# ── ACCOUNT MODE ─────────────────────────────────────────────────────────────
TradingMode=paper

# ── IB GATEWAY SETTINGS ──────────────────────────────────────────────────────
IbDir=/root/Jts
StoreSettingsOnServer=no
MinimizeMainWindow=no

# Override API port to match .env (IB Gateway paper default is already 4001)
OverrideTwsApiPort=4001

# ── CONNECTION HANDLING ───────────────────────────────────────────────────────
ExistingSessionDetectedAction=primary
AcceptIncomingConnectionAction=accept
ReadOnlyLogin=no
AcceptNonBrokerageAccountWarning=yes

# ── NIGHTLY AUTO-RESTART ──────────────────────────────────────────────────────
# IBC will restart IB Gateway at 11:59 PM ET and log back in automatically.
# The bot's ReconnectManager handles the ~1 minute outage window.
AutoRestartTime=11:59 PM
IbAutoClosedown=no
ClosedownAt=

# ── MISC ──────────────────────────────────────────────────────────────────────
ForceTwoFactorAuthentication=no
ShowAllTrades=no
